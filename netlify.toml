# 원툴러 — Netlify 빌드 설정
# 환경변수(비밀키)는 Netlify 대시보드 > Site settings > Environment variables 에서 설정하세요.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  # 빌드 시 prisma generate용 (실제 DB는 대시보드 환경변수에 설정)
  DATABASE_URL = "postgresql://build:build@localhost:5432/build"
  SENTRY_AUTH_TOKEN = ""
  CI = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"
